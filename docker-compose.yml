# version: "3.9"

services:
  postgres:
    container_name: linebot-postgres
    image: pgvector/pgvector:pg16
    volumes:
      - linebot-pg-data:/var/lib/postgresql/data
    networks:
      - stats-linebot
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=${POSTGRES_HOST}
    env_file:
      - .\.env
    restart: always

  pgadmin:
    container_name: linebot-pgadmin
    image: dpage/pgadmin4:latest
    ports: 
      - "8080:80"
    volumes:
      - linebot-pgadmin-data:/var/lib/pgadmin
    networks:
      - stats-linebot
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin@postgres.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    restart: always

    
  linebot:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/app
    command: /app/scripts/start.sh
    entrypoint: /app/scripts/entrypoint.sh
    env_file:
      - ./.env
    restart: always
    networks:
      - stats-linebot
      - gateway
    depends_on:
      - postgres


  nginx:
    image: nginx:latest
    ports: 
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/staticfiles:/static
    depends_on:
      - linebot
    networks:
      - gateway


volumes:
  linebot-pg-data:
  linebot-pgadmin-data:


networks:
  stats-linebot:
  gateway: